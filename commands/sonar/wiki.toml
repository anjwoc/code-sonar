description = "Code-Sonar Markdown 산출물을 Confluence 페이지 트리로 발행한다."
prompt = """
## Code-Sonar Wiki Publish

너는 Code-Sonar 위키 발행 에이전트다.

### 입력

{{args}}

args에는 Space Key, parent page id, 또는 업로드 모드가 포함될 수 있다. 부족한 값은 한 번만 질문하고, 나머지는 `.env`와 `sonar/config/sonar-config.md`에서 읽는다.

### 1. 출력 루트 결정

아래 순서로 Markdown 출력 루트를 결정한다.

1. `.env`의 `SONAR_OUTPUT_DIR`
2. 환경변수 `SONAR_OUTPUT_DIR`
3. 현재 디렉터리의 `sonar-out/`

출력 루트의 basename이 `code-sonar`여도 해당 이름의 중간 위키 페이지를 만들지 않는다. 출력 루트의 자식 파일과 디렉터리를 선택한 parent page 바로 아래에 펼친다.

### 2. 페이지 트리 규칙

- 디렉터리는 목차/폴더 페이지로 만든다.
- Markdown 파일은 각각 별도 child page로 만든다.
- 프로젝트 디렉터리의 여러 Markdown 파일을 하나의 페이지로 병합하지 않는다.
- `_... Index.md`, `_... System Index.md`, `Index.md`의 위키 표시 제목은 `Index`다.
- 반복되는 비인덱스 파일은 `{프로젝트명} - {파일명}` 제목을 사용한다.
- Confluence가 동일 제목 `Index`를 거절하면 API title만 `{디렉터리명} - Index`로 fallback한다.

### 3. Mermaid 렌더링 규칙

Markdown을 XHTML로 변환하지 않는다. `atls wiki create/update ... --markdown-file` 또는 Confluence `markdown` macro를 사용한다.

Mermaid fenced block은 아래 형태 그대로 유지해야 한다.

```markdown
```mermaid
flowchart LR
    A["GET /v1/orders"] --> B["Service"]
```
```

### 4. 실행 절차

1. `.env`를 읽고 `SONAR_OUTPUT_DIR`을 확인한다.
2. `find "$SONAR_OUTPUT_DIR" -type f -name '*.md'`로 대상 파일을 수집한다.
3. 업로드 계획을 표로 보여주고 사용자 확인을 받는다.
4. 디렉터리 페이지를 먼저 만들고, 파일 페이지를 하위에 생성/업데이트한다.
5. 디렉터리 페이지는 ToC 전용으로 만든다. `# {title}`, `## Pages`, child page 링크만 포함하고 placeholder 문장, 상세 요약, Mermaid, 표, literal `\\n` 텍스트를 넣지 않는다.
6. 모든 Markdown은 markdown macro 방식으로 업로드한다.
7. 실패한 페이지는 기록하고 나머지 업로드는 계속한다.
8. 완료 후 생성/업데이트된 URL과 실패 사유를 보고한다.

### 5. 완료 기준

- 출력 루트명이 중간 페이지로 생기지 않는다.
- 프로젝트 디렉터리 아래에 `Index`, `Data Flow`, `Architecture & Dependencies` 등이 child page로 존재한다.
- 디렉터리 페이지는 하위 페이지 링크만 있는 ToC이며 literal `\\n` placeholder가 보이지 않는다.
- 대표 페이지 storage body에 `ac:name=\"markdown\"`이 존재한다.
- Mermaid block이 code block 문자열이 아니라 렌더링 가능한 fenced block으로 남아 있다.

지금 바로 출력 루트와 parent page를 확인하고 업로드 계획을 작성하라.
"""
